name: fluid-paper-polishing

always_load:
  - static/core/reader-workflow.md
  - static/core/terminology-ledger.md
  - static/core/stance.md
  - static/core/failure-modes.md
  - static/core/fluid-integrity.md
  - static/core/output-format.md

axes:
  contribution_type:
    detect: >
      Identify the paper's main argumentative product. Choose method-development
      when the central claim concerns a new solver, model, closure, boundary
      treatment, or implementation; physical-investigation when the main result
      is a flow or transport insight; comparative-assessment when the paper
      evaluates methods under matched conditions; review-synthesis for literature
      synthesis; and data-driven-modeling when learning or data inference is a
      central methodological component.
    default: method-development
    multi: false
    values:
      method-development: static/contribution-types/method-development.md
      physical-investigation: static/contribution-types/physical-investigation.md
      comparative-assessment: static/contribution-types/comparative-assessment.md
      review-synthesis: static/contribution-types/review-synthesis.md
      data-driven-modeling: static/contribution-types/data-driven-modeling.md
  study_type:
    detect: >
      Use the user's description first. Choose numerical for CFD, kinetic,
      discretization, solver, or simulation papers; experimental for measured
      facility or laboratory studies; theoretical for derivation or analysis
      without a primary numerical/experimental contribution; review for
      literature synthesis.
    default: numerical
    multi: false
    values:
      numerical: static/study-types/numerical.md
      experimental: static/study-types/experimental.md
      theoretical: static/study-types/theoretical.md
      review: static/study-types/review.md
  section:
    detect: >
      Infer the rhetorical section from its heading and content. Select multiple
      values for a full manuscript or a combined section. Treat governing
      equations, numerical algorithms, and experimental setup as
      formulation-methods. Use results-discussion only when the manuscript
      intentionally combines reporting and interpretation.
    multi: true
    values:
      title: static/sections/title.md
      abstract: static/sections/abstract.md
      introduction: static/sections/introduction.md
      formulation-methods: static/sections/formulation-methods.md
      verification-validation: static/sections/verification-validation.md
      results: static/sections/results.md
      discussion: static/sections/discussion.md
      results-discussion: static/sections/results-discussion.md
      conclusion: static/sections/conclusion.md
      captions: static/sections/captions.md
  language:
    detect: >
      Use zh-to-en for Chinese source text or strongly Chinese-influenced English;
      otherwise use en.
    default: en
    multi: false
    values:
      en: static/language/en.md
      zh-to-en: static/language/zh-to-en.md
  journal:
    detect: >
      Map Journal of Computational Physics to jcp, Journal of Fluid Mechanics to
      jfm, Physics of Fluids to pof, Physical Review Fluids to prf,
      International Journal of Heat and Mass Transfer to ijhmt, Physical Review E
      to pre, and Progress in Energy and Combustion Science to pecs. Use generic
      when no modeled target is named.
    default: generic
    multi: false
    values:
      jcp: static/journals/jcp.md
      jfm: static/journals/jfm.md
      pof: static/journals/pof.md
      prf: static/journals/prf.md
      ijhmt: static/journals/ijhmt.md
      pre: static/journals/pre.md
      pecs: static/journals/pecs.md
      generic: static/journals/generic.md
  physics:
    detect: >
      Choose the dominant physics. Use kinetic-rarefied for Boltzmann, UGKS,
      DUGKS, DSMC, LBM, or rarefied flow; heat-radiation for thermal, phonon,
      radiative, or conjugate transport; multiphase-reacting for dispersed or
      reacting flows; interfacial-porous for interfaces, phase change, porous
      media, shale, or capillarity; turbulence-data-driven for DNS/RANS/LES,
      closures, or machine learning; otherwise general-fluids.
    default: general-fluids
    multi: true
    values:
      general-fluids: references/fluid-conventions.md
      kinetic-rarefied: references/kinetic-and-rarefied.md
      heat-radiation: references/heat-and-radiation.md
      multiphase-reacting: references/multiphase-and-reacting.md
      interfacial-porous: references/interfacial-and-porous.md
      turbulence-data-driven: references/turbulence-and-data-driven.md

references:
  on_demand:
    - condition: terminology, collocations, or claim verbs need field-specific guidance
      path: references/fluid-language-bank.md
    - condition: the manuscript proposes or evaluates a numerical method
      path: references/numerical-evidence-checklist.md
    - condition: the abstract, title, or paragraph architecture needs reconstruction
      path: references/corpus-move-patterns.md
    - condition: the draft uses strong claim verbs or may overstate evidence
      path: references/claim-evidence-calibration.md
    - condition: two or more methods are compared
      path: references/comparative-method-writing.md
    - condition: a review article needs taxonomy, synthesis, gaps, or outlook structure
      path: references/review-synthesis-patterns.md
    - condition: the user asks how this style was derived from the local literature
      path: references/corpus-derived-patterns.md
